<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generitech Rentals</title>
  <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
  <header class="main-header">
    <div class="logo">Generitech Rentals</div>
    <div class="header-actions">
      <span id="user-role-label">Not logged in</span>
      <button id="login-btn">Log In</button>
      <button id="logout-btn" class="hidden">Logout</button>
      <button id="cart-btn">Cart (<span id="cart-count">0</span>)</button>
    </div>
  </header>

  <!-- Login Modal -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Log In</h2>
      <label>
        Username:
        <input type="text" id="login-username">
      </label>

      <label>
        Password:
        <input type="password" id="login-password">
      </label>

      <label>
        Role:
        <select id="login-role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </label>
      <div class="modal-actions">
        <button id="login-submit">Log In</button>
        <button id="login-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Cart Modal -->
  <div id="cart-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Your Cart</h2>
      <div id="cart-items"></div>
      <button id="submit-rental-request">Submit Rental Request</button>
      <button id="cart-close">Close</button>
    </div>
  </div>

  <!-- Notification Modal -->
  <div id="notification-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Notification</h2>
      <p id="notification-text"></p>
      <button id="notification-close">Close</button>
    </div>
  </div>

  <main>
    <section id="inventory-section">
      <h1>Available Inventory</h1>
      <div id="inventory-grid" class="card-grid"></div>
    </section>

    <section id="user-rentals-section" class="hidden">
      <h2>My Rentals</h2>
      <div id="user-rentals-list"></div>
    </section>

    <!-- Admin Tabs -->
    <section id="admin-section" class="hidden">
      <h2>Admin Panel</h2>
      <div class="tabs">
        <button class="tab-btn active" data-tab="modify-items-tab">Modify Items</button>
        <button class="tab-btn" data-tab="approve-requests-tab">Approve/Deny Requests</button>
        <button class="tab-btn" data-tab="rental-history-tab">Rental History</button>
      </div>

      <div id="modify-items-tab" class="tab-content active">
        <h3>Modify Items</h3>
        <div class="modify-form">
          <h4>Add Item</h4>
          <label>
            Item Name:
            <input type="text" id="add-item-name">
          </label>
          <label>
            Quantity:
            <input type="number" id="add-item-qty" min="1">
          </label>
          <button id="add-item-btn">Add Item</button>
        </div>

        <div class="modify-form">
          <h4>Delete All of One Item</h4>
          <label>
            Item Name:
            <input type="text" id="delete-item-name">
          </label>
          <button id="delete-item-btn">Delete Item</button>
        </div>

        <div class="modify-form">
          <h4>Damage Out Item</h4>
          <label>
            Item Name:
            <input type="text" id="damage-item-name">
          </label>
          <label>
            Serial Number:
            <input type="text" id="damage-serial-number">
          </label>
          <label>
            Item Number:
            <input type="text" id="damage-item-number">
          </label>
          <button id="damage-item-btn">Damage Out</button>
        </div>
      </div>

      <div id="approve-requests-tab" class="tab-content">
        <h3>Approve/Deny User Requests</h3>
        <div id="requests-list">
          <!-- Requests injected by JS -->
        </div>
      </div>

      <div id="rental-history-tab" class="tab-content">
        <h3>Rental History</h3>
        <div id="rental-history-list">
          <!-- History injected by JS -->
        </div>
      </div>
    </section>
  </main>

<script src="../static/script.js" defer></script>
</body>
</html>
